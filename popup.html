<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Volume Booster</title>
  <link rel="icon" href="assets/bastionboostblack.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="assets/bastionboostwhite.png" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="app" aria-labelledby="title">
    <a class="brand-link" href="https://bastiontech.org/" target="_blank" rel="noopener noreferrer"
      aria-label="Visit BastionTech">
      <picture>
        <source srcset="assets/BastionLogoWhite.png" media="(prefers-color-scheme: dark)">
        <img class="brand-logo" src="assets/BastionLogoBlack.png" alt="BastionTech">
      </picture>
    </a>
    <header class="hero">
      <picture class="logo" aria-hidden="true">
        <source srcset="assets/bastionboostwhite.png" media="(prefers-color-scheme: dark)">
        <img class="app-logo" src="assets/bastionboostblack.png" alt="">
      </picture>
      <div>
        <h1 id="title">Volume Booster</h1>
        <p>Boost this tab up to 600%</p>
      </div>
    </header>

    <section class="meter" aria-live="polite">
      <span id="boostValue">100%</span>
      <small id="boostLabel">Normal volume</small>
    </section>

    <label class="slider-label" for="boostSlider">Boost level</label>
    <input id="boostSlider" type="range" min="0" max="600" step="10" value="100">

    <div class="ticks" aria-hidden="true">
      <span>0%</span>
      <span>100%</span>
      <span>300%</span>
      <span>600%</span>
    </div>

    <div class="controls">
      <button type="button" class="preset" data-boost="100">Reset</button>
      <button type="button" class="preset" data-boost="200">2×</button>
      <button type="button" class="preset" data-boost="400">4×</button>
      <button type="button" class="preset" data-boost="600">Max</button>
    </div>

    <p id="status" class="status" role="status">Ready</p>

    <footer class="oss-note">
      <a href="https://github.com/BastionTech/volumebooster" target="_blank" rel="noopener noreferrer">
        This is a Free and Open Source project. Check out the repository on GitHub.
      </a>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>

</html>
